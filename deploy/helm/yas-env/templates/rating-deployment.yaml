apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rating-service
  template:
    metadata:
      labels:
        app: rating-service
    spec:
      containers:
        - name: rating-service
          image: "{{ .Values.rating_service.image }}:{{ default .Values.global.defaultTag .Values.rating_service.tag }}"
          ports:
            - containerPort: 8080
