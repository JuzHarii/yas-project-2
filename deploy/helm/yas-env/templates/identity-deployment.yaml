apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: "{{ .Values.identity_service.image }}:{{ default .Values.global.defaultTag .Values.identity_service.tag }}"
          ports:
            - containerPort: 80
