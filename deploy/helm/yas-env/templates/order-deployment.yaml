apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: "{{ .Values.order_service.image }}:{{ default .Values.global.defaultTag .Values.order_service.tag }}"
          ports:
            - containerPort: 8080
