apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: "{{ .Values.customer_service.image }}:{{ default .Values.global.defaultTag .Values.customer_service.tag }}"
          ports:
            - containerPort: 8080
